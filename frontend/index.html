<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/wails.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Self Server</title>
    </head>
    <body>
        <ss-playground>
            <aside>
                <div class="projects__container"></div>
                <div class="sidebar-footer">
                    <button type="button" id="add-project-btn">
                        ＋ new project
                    </button>
                    <button
                        type="button"
                        id="theme-toggle-btn"
                        title="Theme: system"
                    >
                        ◑
                    </button>
                </div>
            </aside>
            <main></main>
        </ss-playground>
        <dialog id="add-project-dialog" class="modal">
            <div class="modal__content">
                <span>Add new Project</span>
                <form method="dialog">
                    <fieldset>
                        <label>Name</label>
                        <input
                            type="text"
                            id="add-project-name"
                            placeholder="e.g. MyProject"
                            value=""
                        />
                    </fieldset>
                    <fieldset>
                        <button
                            type="button"
                            value="cancel"
                            id="add-project-cancel"
                        >
                            Cancel
                        </button>
                        <button
                            type="button"
                            class="submit"
                            id="add-project-submit"
                            value="default"
                        >
                            Confirm
                        </button>
                    </fieldset>
                </form>
            </div>
        </dialog>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
